<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>商品详情</title>

<link rel="stylesheet" href="style.css">

<style>

.product{

padding:20px;

}

.product img{

width:100%;
height:260px;
object-fit:cover;
border-radius:15px;

}

.name{

margin-top:20px;
font-size:25px;
font-weight:bold;

}

.price{

font-size:35px;
color:red;
margin-top:15px;

}

.desc{

margin-top:20px;
line-height:28px;
color:#666;

}

.buy{

position:fixed;

left:0;

right:0;

bottom:0;

height:65px;

background:white;

display:flex;

align-items:center;

justify-content:center;

box-shadow:0 -3px 10px rgba(0,0,0,.15);

}

.buy button{

width:90%;

height:45px;

background:#2F80FF;

color:white;

border:none;

border-radius:10px;

font-size:18px;

}

</style>

</head>

<body>

<div class="product">

<img id="image" src="images/product.png">

<div class="name" id="name">

加载中...

</div>

<div class="price" id="price">

RM 0

</div>

<div class="desc" id="description">

商品介绍

</div>

</div>

<div class="buy">

<button>

立即购买

</button>

</div>

<script type="module" src="product-page.js"></script>

</body>

</html>
