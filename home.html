<!DOCTYPE html>
<html lang="zh-CN">
<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>JiaHao Club</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<!-- 顶部 -->

<header class="header">

<div class="logo">

JiaHao Club

</div>

<div class="search">

<input type="text" placeholder="搜索商品...">

</div>

<div class="menu">

☰

</div>

</header>

<!-- Banner -->

<section class="banner">

<img src="images/banner.jpg" alt="banner">

</section>

<!-- 公告 -->

<div class="notice">

📢 欢迎来到 JiaHao Club 官方商城！

</div>

<!-- 分类 -->

<div class="category">

<div class="item">

<img src="images/game1.png">

</div>

<div class="item">

<img src="images/game2.png">

<p>地铁逃生</p>

</div>

<div class="item">

<img src="images/game3.png">

<p>暗区突围</p>

</div>

<img src="images/game4.png">

<p>王者荣耀</p>

</div>

</div>

<!-- 商品 -->

<div class="title">

热门商品

</div>

<div class="products" id="products">

<div class="card">

<img src="images/product.png">

<h3>测试商品</h3>

RM 6.80

</p>

<button>

立即购买

</button>

</div>

<!-- 底部导航 -->

<footer>

<div class="active">

🏠

<p>首页</p>

</div>

<div>

📂

<p>分类</p>

</div>

<div>

💬

<p>客服</p>

</div>

<div>

📢

<p>公告</p>

</div>

<div>

👤

</div>
