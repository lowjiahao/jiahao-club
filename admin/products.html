<input id="name" class="input" type="text" placeholder="商品名称">

<select id="category">
    <option>请选择分类</option>
    <option>三角洲</option>
    <option>地铁逃生</option>
    <option>暗区突围</option>
    <option>和平精英</option>
    <option>王者荣耀</option>
</select>

<input id="price" class="input" type="number" placeholder="商品价格">

<input id="oldPrice" class="input" type="number" placeholder="原价">

<input id="stock" class="input" type="number" placeholder="库存">

<input id="image" class="file" type="file">

<textarea id="description" placeholder="商品介绍"></textarea>

<button class="btn" onclick="publishProduct()">
发布商品
</button>
